[versions]
animationCore = "1.11.2"

[plugins]
android-application = { id = "com.android.application", version = "9.1.1" }
android-library = { id = "com.android.library", version = "9.1.1" }
kotlin-compose = { id = "org.jetbrains.kotlin.plugin.compose", version = "2.3.21" }

[libraries]
androidx-annotation = { module = "androidx.annotation:annotation", version = "1.10.0" }
androidx-appcompat = { module = "androidx.appcompat:appcompat", version = "1.7.1" }
androidx-viewpager = { module = "androidx.viewpager:viewpager", version = "1.1.0" }

androidx-webgpu = { module = "androidx.webgpu:webgpu", version = "1.0.0-alpha05" }
androidx-activity-compose = { group = "androidx.activity", name = "activity-compose", version = "1.13.0" }
androidx-compose-bom = { group = "androidx.compose", name = "compose-bom", version = "2026.05.01" }
androidx-compose-ui = { group = "androidx.compose.ui", name = "ui" }
androidx-compose-foundation = { group = "androidx.compose.foundation", name = "foundation", version = "1.11.2" }
androidx-compose-animation-core = { group = "androidx.compose.animation", name = "animation-core", version.ref = "animationCore" }
